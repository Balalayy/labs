<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Синус калькулятор</title>
</head>
<body>
    <h1>Вычисление синуса</h1>
    
    <script>

        let x = prompt("Введите число")
        
            let num = parseFloat(x)
            
            if (isNaN(num)) {
                alert("Это не число!")
            } else {
                let sinus = Math.sin(num)
                
                alert("Синус числа " + num + " = " + sinus)
                
                document.write("<p>Вы ввели: " + num + "</p>")
                document.write("<p>Синус: " + sinus + "</p>")
            }
        
        console.log("Программа завершена")
    </script>
</body>
</html>
