<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
</head>
<body>

<ul id="list"></ul>

<script>
    let count = prompt('Сколько пунктов?')
    
    for (let i = 1; i <= count; i++) {
        let text = prompt(`Пункт ${i}`)
        let li = document.createElement('li')
        li.textContent = text
        document.getElementById('list').append(li)
    }
</script>

</body>
</html>
