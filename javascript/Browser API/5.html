<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Таблица 5x6</title>
    <style>
        table {
            border-collapse: collapse;
            font-size: 18px;
            text-align: center;
            margin: 20px auto;
        }
        th, td {
            border: 2px solid #000000;
            padding: 12px 20px;
        }
        .even {
            background-color: red;
        } 
    </style>
</head>
<body>
    <table>
        <tr>
            <td>1:1</td>
            <td>1:2</td>
            <td>1:3</td>
            <td>1:4</td>
            <td>1:5</td>
            <td>1:6</td>
        </tr>
        <tr>
            <td>2:1</td>
            <td>2:2</td>
            <td>2:3</td>
            <td>2:4</td>
            <td>2:5</td>
            <td>2:6</td>
        </tr>
        <tr>
            <td>3:1</td>
            <td>3:2</td>
            <td>3:3</td>
            <td>3:4</td>
            <td>3:5</td>
            <td>3:6</td>
        </tr>
        <tr>
            <td>4:1</td>
            <td>4:2</td>
            <td>4:3</td>
            <td>4:4</td>
            <td>4:5</td>
            <td>4:6</td>
        </tr>
        <tr>
            <td>5:1</td>
            <td>5:2</td>
            <td>5:3</td>
            <td>5:4</td>
            <td>5:5</td>
            <td>5:6</td>
        </tr>
    </table>
    <script>
        const rows = document.querySelectorAll('table tbody tr');
        
        for (let i = 0; i < rows.length; i++) {
            const cells = rows[i].querySelectorAll('td');
            for (let j = 0; j < cells.length; j++) {
                const rowNum = i + 1;
                const colNum = j + 1;
                const sum = rowNum + colNum;

                if (sum % 2 === 0) {
                    cells[j].classList.add('even');
                }
            }
        }
    </script>
</body>
</html>
