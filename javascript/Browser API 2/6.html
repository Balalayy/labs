<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Павлов Павел</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        .month-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            align-items: center;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            align-items: center;
            background: #e8f4f8;
            padding: 10px;
            border-radius: 5px;
        }
        .result-row label {
            font-weight: bold;
            font-size: 18px;
        }
        .result-row input {
            width: 150px;
            padding: 5px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        } 
        button:hover {
            background-color: #45a049;
        }
        button:last-child {
            background-color: #2196F3;
        }
        button:last-child:hover {
            background-color: #0b7dda;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Введите начисленную зарплату за следующие месяцы</h2>
    
    <form id="salaryForm">
        <div class="month-row">
            <label>Январь:</label>
            <input type="number" id="jan" value="300">
        </div>
        <div class="month-row">
            <label>Февраль:</label>
            <input type="number" id="feb" value="200">
        </div>
        <div class="month-row">
            <label>Март:</label>
            <input type="number" id="mar" value="500">
        </div>
        <div class="month-row">
            <label>Апрель:</label>
            <input type="number" id="apr" value="250">
        </div>
        <div class="month-row">
            <label>Май:</label>
            <input type="number" id="may" value="350">
        </div>
        <div class="month-row">
            <label>Июнь:</label>
            <input type="number" id="jun" value="500">
        </div>
        
        <div class="result-row">
            <label>Средняя зарплата:</label>
            <input type="text" id="average" readonly value="350">
        </div>
        
        <div class="buttons">
            <button type="button" onclick="calculateAverage()">Вычислить</button>
            <button type="button" onclick="resetToDefault()">Обновить</button>
        </div>
    </form>
</div>

<script>
    function calculateAverage() {
        let jan = parseFloat(document.getElementById('jan').value) || 0;
        let feb = parseFloat(document.getElementById('feb').value) || 0;
        let mar = parseFloat(document.getElementById('mar').value) || 0;
        let apr = parseFloat(document.getElementById('apr').value) || 0;
        let may = parseFloat(document.getElementById('may').value) || 0;
        let jun = parseFloat(document.getElementById('jun').value) || 0;
        
        let sum = jan + feb + mar + apr + may + jun;
        let average = sum / 6;
    
        document.getElementById('average').value = average.toFixed(2);
    }
    
    function resetToDefault() {
        document.getElementById('jan').value = 300;
        document.getElementById('feb').value = 200;
        document.getElementById('mar').value = 500;
        document.getElementById('apr').value = 250;
        document.getElementById('may').value = 350;
        document.getElementById('jun').value = 500;

        calculateAverage();
    }
    
    window.onload = function() {
        calculateAverage();
    };
</script>

</body>
</html>
