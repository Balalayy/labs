<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        hr {
            margin: 20px 0;
        }
        .block {
            margin-bottom: 20px;
        }
        label {
            margin-right: 15px;
        }
        input[type="number"] {
            width: 50px;
        }
    </style>
</head>
<body>

<h2>Горизонтальные линии</h2>

<p>Выберите значения параметров, которые требуется изменить, и нажмите кнопку <b>Выполнить</b>.</p>

<hr id="myHr" size="3" width="70%" color="black">

<div class="block">
    <b>Выравнивание</b><br>
    <label><input type="radio" name="align" value="left"> LEFT</label>
    <label><input type="radio" name="align" value="center" checked> CENTER</label>
    <label><input type="radio" name="align" value="right"> RIGHT</label>
</div>

<div class="block">
    <b>толщина линии (size)</b><br>
    <input type="number" id="sizeInput" min="1" max="20" value="3">
</div>

<div class="block">
    <b>длина линии (width)</b><br>
    <input type="number" id="widthInput" min="10" max="100" value="70"> %
</div>

<div class="block">
    <b>Цвет линии (color)</b><br>
    <select id="colorSelect">
        <option value="teal">teal</option>
        <option value="green">green</option>
        <option value="olive">olive</option>
        <option value="navy">navy</option>
        <option value="purple">purple</option>
        <option value="red">red</option>
        <option value="gray">gray</option>
        <option value="silver">silver</option>
        <option value="yellow">yellow</option>
        <option value="blue">blue</option>
        <option value="fuchsia">fuchsia</option>
        <option value="white">white</option>
    </select>
</div>

<button id="executeBtn">Выполнить</button>
<button id="resetBtn">Обновить</button>

<script>
    const hr = document.getElementById('myHr');
    const sizeInput = document.getElementById('sizeInput');
    const widthInput = document.getElementById('widthInput');
    const colorSelect = document.getElementById('colorSelect');
    const alignRadios = document.querySelectorAll('input[name="align"]');
    const executeBtn = document.getElementById('executeBtn');
    const resetBtn = document.getElementById('resetBtn');

    function updateLine() {
        let size = sizeInput.value;
        let width = widthInput.value;
        let color = colorSelect.value;
        
        hr.size = size;
        hr.width = width + '%';
        hr.color = color;
        
        let align = 'center';
        for (let radio of alignRadios) {
            if (radio.checked) {
                align = radio.value;
                break;
            }
        }
        
        if (align === 'left') {
            hr.style.marginLeft = '0';
            hr.style.marginRight = 'auto';
        } else if (align === 'right') {
            hr.style.marginLeft = 'auto';
            hr.style.marginRight = '0';
        } else {
            hr.style.marginLeft = 'auto';
            hr.style.marginRight = 'auto';
        }
    }
    
    function resetToDefault() {
        document.querySelector('input[value="center"]').checked = true;
        sizeInput.value = 3;
        widthInput.value = 70;
        colorSelect.value = 'black';
        updateLine();
    }
    
    executeBtn.onclick = updateLine;
    resetBtn.onclick = resetToDefault;
    
    resetToDefault();
</script>

</body>
</html>
